[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

remappings = [
  "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
  "forge-std/=lib/forge-std/src/"
]

[rpc_endpoints]
liteforge = "https://liteforge.rpc.caldera.xyz/http"
local = "http://localhost:8545"

[etherscan]
liteforge = { key = "dummy", url = "https://liteforge.explorer.caldera.xyz/api" }
